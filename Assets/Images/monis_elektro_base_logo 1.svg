<svg width="600" height="300" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Moni's Elektro Base Logo</title>
  <desc>Logo mit Haus-Symbol, Blitz und bunten Akzentfarben für die Webseite Moni's Elektro Base</desc>

  <style>
    .title-main { font-family: sans-serif; font-size: 36px; font-weight: 700; }
    .title-sub { font-family: sans-serif; font-size: 15px; font-weight: 400; fill: #2980b9; letter-spacing: 2px; }
    .circuit-line { stroke: #27ae60; stroke-width: 1.5; fill: none; opacity: 0.4; }
    .circuit-dot { fill: #27ae60; opacity: 0.55; }
  </style>

  <rect x="40" y="20" width="600" height="280" rx="20" fill="#f0f4f8" stroke="#d0dbe8" stroke-width="1"/>

  <polyline class="circuit-line" points="60,180 80,180 80,200 110,200"/>
  <circle class="circuit-dot" cx="80" cy="180" r="3"/>
  <polyline class="circuit-line" points="60,230 90,230 90,210 120,210"/>
  <circle class="circuit-dot" cx="90" cy="230" r="3"/>
  <polyline class="circuit-line" points="570,160 590,160 590,185 610,185"/>
  <circle class="circuit-dot" cx="590" cy="160" r="3"/>
  <polyline class="circuit-line" points="570,220 600,220 600,200 620,200"/>
  <circle class="circuit-dot" cx="600" cy="220" r="3"/>

  <!-- Haus -->
  <rect x="172" y="158" width="96" height="72" rx="3" fill="#ffffff" stroke="#c0ccd8" stroke-width="1"/>
  <polygon points="160,162 220,108 280,162" fill="#e8445a"/>
  <rect x="202" y="196" width="26" height="34" rx="3" fill="#1e2a3a"/>
  <polygon points="226,122 214,148 224,148 214,172 232,142 221,142" fill="#f39c12"/>

  <!-- Titel -->
  <text x="306" y="158" class="title-main" fill="#1e2a3a">Moni's</text>
  <text x="306" y="200" class="title-main" fill="#e8445a">Elektro</text>
  <text x="306" y="242" class="title-main" fill="#2980b9">Base</text>

  <!-- Untertitel -->
  <text x="160" y="268" class="title-sub">HOME ASSISTANT KOMPONENTEN</text>

  <!-- Farbpunkte -->
  <circle cx="160" cy="288" r="5" fill="#e8445a"/>
  <circle cx="176" cy="288" r="5" fill="#27ae60"/>
  <circle cx="192" cy="288" r="5" fill="#2980b9"/>
  <circle cx="208" cy="288" r="5" fill="#f39c12"/>

</svg>
